name: CI

on:
  push:
    branches:
      - main
      - p0-*
  pull_request:

jobs:
  build-and-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Typecheck / lint gate
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Secret scan placeholder
        run: echo "Add gitleaks or equivalent secret scanning here before making CI blocking."
