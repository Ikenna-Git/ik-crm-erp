<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Civis - Offline</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f8fafc;
      color: #334155;
    }
    .container {
      text-align: center;
      max-width: 400px;
      padding: 2rem;
    }
    .icon {
      width: 64px;
      height: 64px;
      background: #000;
      border-radius: 12px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      font-weight: bold;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p {
      color: #64748b;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .retry-btn {
      background: #000;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .retry-btn:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">C</div>
    <h1>You're offline</h1>
    <p>It looks like you're not connected to the internet. Some features may not be available until your connection is restored.</p>
    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
  </div>

  <script>
    // Check for connection restoration
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
